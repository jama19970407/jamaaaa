<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CaveMines</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0b1625;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Segoe UI', sans-serif;
      color: #fff;
    }

    /* ===== MAIN LAYOUT ===== */
    .game-wrapper {
      display: flex;
      align-items: stretch;
      background: #0e1c2f;
      width: 820px;
      max-width: 100vw;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 60px rgba(0,0,0,0.7);
      min-height: 540px;
    }

    /* ===== LEFT PANEL ===== */
    .left-panel {
      width: 235px;
      min-width: 235px;
      background: #0f1e33;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-right: 1px solid #182d46;
    }

    .field-label {
      font-size: 11px;
      color: #4a6f8f;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 5px;
    }

    /* Bet row */
    .bet-row {
      display: flex;
      align-items: center;
      background: #091522;
      border: 1px solid #1a3352;
      border-radius: 10px;
      overflow: hidden;
      height: 46px;
    }
    .bet-row .b-icon {
      width: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #f0c040;
      flex-shrink: 0;
    }
    .bet-row input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      min-width: 0;
    }
    .adj-btn {
      width: 38px;
      height: 100%;
      background: #152840;
      border: none;
      color: #5a8fb5;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
      font-family: inherit;
    }
    .adj-btn:hover { background: #1e3a5a; color: #fff; }

    /* Mine count row */
    .mine-row {
      display: flex;
      align-items: center;
      background: #091522;
      border: 1px solid #1a3352;
      border-radius: 10px;
      overflow: hidden;
      height: 46px;
    }
    .mine-row .m-icon {
      width: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .mine-row .m-num {
      flex: 1;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
    }

    /* Quick buttons */
    .quick-row {
      display: flex;
      gap: 5px;
      margin-top: 5px;
    }
    .qb {
      flex: 1;
      height: 30px;
      background: #152840;
      border: 1px solid #1a3352;
      border-radius: 7px;
      color: #5a8fb5;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .qb:hover { background: #1e3a5a; color: #fff; }
    .qb.active { background: #1e4d7a; border-color: #2f7bbf; color: #fff; }

    /* Info box */
    .info-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #091522;
      border: 1px solid #1a3352;
      border-radius: 10px;
      padding: 9px 13px;
    }
    .info-box .ib-label { font-size: 11px; color: #4a6f8f; display: flex; align-items: center; gap: 5px; }
    .info-box .ib-val   { font-size: 14px; font-weight: 700; color: #f0c040; }

    /* Multiplier big */
    .mult-big {
      text-align: center;
      font-size: 27px;
      font-weight: 900;
      color: #f0c040;
      min-height: 34px;
      letter-spacing: 1px;
    }

    /* Profit row */
    .profit-box {
      display: none;
      align-items: center;
      justify-content: space-between;
      background: #091522;
      border: 1px solid #1a3352;
      border-radius: 10px;
      padding: 9px 13px;
    }
    .profit-box .pb-label { font-size: 11px; color: #4a6f8f; }
    .profit-box .pb-val   { font-size: 14px; font-weight: 700; color: #43e97b; }

    /* Buttons */
    .btn-play, .btn-cashout {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #1a56db, #1d9bf0);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: filter 0.2s, transform 0.15s;
      font-family: inherit;
    }
    .btn-play:hover    { filter: brightness(1.14); transform: scale(1.01); }
    .btn-cashout       { display: none; background: linear-gradient(90deg, #d97706, #f59e0b); }
    .btn-cashout:hover { filter: brightness(1.1); }

    /* Balance */
    .balance-area {
      margin-top: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      border-top: 1px solid #182d46;
      padding-top: 12px;
    }
    .bal-icon  { font-size: 20px; color: #f0c040; }
    .bal-val   { font-size: 17px; font-weight: 800; color: #fff; }
    .bal-label { font-size: 10px; color: #4a6f8f; margin-top: 1px; }

    /* ===== RIGHT PANEL ===== */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 22px 16px;
      background: linear-gradient(160deg, #0d1e34 0%, #091422 100%);
    }

    /* Title */
    .game-title {
      font-size: 12px;
      font-weight: 800;
      color: #f0c040;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 7px;
    }    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }.cell {
      width: 96px;
      height: 80px;
      border-radius: 16px;
      background: linear-gradient(180deg, #1e5ca0 0%, #143e78 50%, #0d2d5a 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: all 0.14s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 6px 0px #0a2040, 0 8px 18px rgba(0,0,0,0.5), inset 0 1px 0 rgba(120,190,255,0.18);
    }
    .cell::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 42%;
      background: linear-gradient(to bottom, rgba(140,200,255,0.14), transparent);
      border-radius: 15px 15px 0 0;
      pointer-events: none;
    }
    .cell:hover:not(.s):not(.m):not(.dis) {
      background: linear-gradient(180deg, #2a72c0 0%, #1a548e 50%, #133e70 100%);
      box-shadow: 0 6px 0px #0a2040, 0 10px 28px rgba(37,99,235,0.55);
      transform: translateY(-2px);
    }
    .cell:active:not(.s):not(.m):not(.dis) {
      transform: translateY(2px);
      box-shadow: 0 2px 0px #0a2040, 0 4px 10px rgba(0,0,0,0.4);
    }
    .cell.s {
      background: linear-gradient(180deg, #1a7a3a 0%, #115228 50%, #0a3a1c 100%);
      border: none;
      box-shadow: 0 6px 0px #072015, 0 0 20px rgba(35,150,70,0.4);
      cursor: default;
      animation: popIn 0.28s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    .cell.m {
      background: linear-gradient(180deg, #8a1515 0%, #5a0e0e 50%, #3a0808 100%);
      border: none;
      box-shadow: 0 6px 0px #250505, 0 0 20px rgba(180,40,40,0.5);
      cursor: default;
      animation: boomShake 0.35s ease;
    }
    .cell.dis { cursor: default; }    .gem  { font-size: 34px; filter: drop-shadow(0 0 8px #ffe06699); }
    .bomb { font-size: 28px; filter: drop-shadow(0 0 8px #ff444499); }

    @keyframes popIn {
      0%   { transform: scale(0.72); }
      65%  { transform: scale(1.14); }
      100% { transform: scale(1); }
    }
    @keyframes boomShake {
      0%,100% { transform: translateX(0); }
      18%     { transform: translateX(-8px); }
      36%     { transform: translateX(8px); }
      54%     { transform: translateX(-4px); }
      72%     { transform: translateX(4px); }
    }    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 0;
      align-items: center;
      background: #091522;
      border: 1px solid #182d46;
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
      max-width: 510px;
    }
    .stat-pill {
      flex: 1;
      padding: 10px 14px;
      text-align: center;
      border-right: 1px solid #182d46;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .stat-pill:last-child { border-right: none; }
    .stat-pill .sv { font-size: 15px; font-weight: 800; color: #fff; }
    .stat-pill .sl { font-size: 11px; color: #4a6f8f; }
    .stat-pill.mp .sv { color: #e05555; }

    /* mine count bottom display like 1win */
    .bottom-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 510px;
      background: #091522;
      border: 1px solid #182d46;
      border-radius: 12px;
      padding: 10px 20px;
    }
    .bi-left { display: flex; align-items: center; gap: 8px; }
    .bi-left .bi-icon { font-size: 18px; color: #f0c040; }
    .bi-left .bi-text { font-size: 12px; color: #4a6f8f; }
    .bi-left .bi-val  { font-size: 14px; font-weight: 800; color: #f0c040; }
    .bi-center { display: flex; align-items: center; gap: 10px; }
    .bi-arr { background: #152840; border: 1px solid #1a3352; border-radius: 7px; width: 30px; height: 30px; color: #5a8fb5; font-size: 16px; cursor: pointer; display:flex; align-items:center; justify-content:center; }
    .bi-arr:hover { background: #1e3a5a; color: #fff; }
    .bi-mine-num { font-size: 15px; font-weight: 800; color: #fff; min-width: 20px; text-align:center; }
    .bi-mine-lbl { font-size: 11px; color: #4a6f8f; text-align:center; }

    /* Next row */
    .next-row {
      display: none;
      align-items: center;
      gap: 6px;
      background: #091522;
      border: 1px solid #182d46;
      border-radius: 10px;
      padding: 8px 14px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nr-lbl { font-size: 10px; color: #4a6f8f; letter-spacing: 0.8px; }
    .nm-b {
      background: rgba(240,192,64,0.11);
      border: 1px solid rgba(240,192,64,0.3);
      color: #f0c040;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
    }
    .nm-b:nth-child(3){ opacity: 0.75; }
    .nm-b:nth-child(4){ opacity: 0.55; }
    .nm-b:nth-child(5){ opacity: 0.35; }

    /* Overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.68);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }
    .overlay.show { display: flex; }
    .popup {
      background: linear-gradient(135deg, #0f1e33, #091422);
      border: 1.5px solid #1a3352;
      border-radius: 20px;
      padding: 36px 40px;
      text-align: center;
      max-width: 340px;
      width: 90%;
      animation: popIn 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    .popup .pe { font-size: 58px; margin-bottom: 12px; }
    .popup h2  { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
    .popup p   { color: #4a6f8f; font-size: 14px; margin-bottom: 14px; }
    .popup .ps { font-size: 32px; font-weight: 900; color: #f0c040; margin-bottom: 22px; }

    .confetti-piece {
      position: fixed;
      border-radius: 2px;
      animation: fall 2.2s linear forwards;
      z-index: 300;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    /* Responsive */
    @media (max-width: 860px) {
      .game-wrapper { flex-direction: column; border-radius: 0; width: 100vw; }
      .left-panel   { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid #182d46; }
    }
    @media (max-width: 540px) {
      .cell { width: 58px; height: 52px; }
      .gem  { font-size: 22px; }
      .bomb { font-size: 20px; }
    }
  </style>
</head>
<body>

<div class="game-wrapper">

  <!-- ============ LEFT PANEL ============ -->
  <div class="left-panel">

    <div>
      <div class="field-label">Stavka miqdori</div>
      <div class="bet-row">
        <div class="b-icon">⭐</div>
        <input type="number" id="betInput" value="100" min="10" step="10" />
        <button class="adj-btn" onclick="adjustBet(-100)">−</button>
        <button class="adj-btn" onclick="adjustBet(+100)">+</button>
      </div>
    </div>

    <div>
      <div class="field-label">Lovushkalar soni</div>
      <div class="mine-row">
        <div class="m-icon">💣</div>
        <span class="m-num" id="minesNum">1</span>
        <button class="adj-btn" onclick="changeMines(-1)">‹</button>
        <button class="adj-btn" onclick="changeMines(+1)">›</button>
      </div>
      <div class="quick-row">        <button class="qb active" id="qm1" onclick="setMines(1)">1</button>
        <button class="qb"        id="qm3" onclick="setMines(3)">3</button>
        <button class="qb"        id="qm5" onclick="setMines(5)">5</button>
        <button class="qb"        id="qm7" onclick="setMines(7)">7</button>
      </div>
    </div>

    <div class="info-box">
      <span class="ib-label">⭐ Maks. yutish</span>
      <span class="ib-val" id="maxWin">—</span>
    </div>

    <div class="mult-big" id="multBig"></div>

    <div class="profit-box" id="profitBox">
      <span class="pb-label">Joriy foyda</span>
      <span class="pb-val" id="profitVal">+0</span>
    </div>    <button class="btn-play"    id="playBtn"    onclick="startGame()">O'YNASH</button>
    <button class="btn-cashout" id="cashoutBtn" onclick="cashOut()">💰 YECHIB OLISH</button>

  </div>

  <!-- ============ RIGHT PANEL ============ -->
  <div class="right-panel">    <div class="game-title"><span>⭐</span> CAVEMINES</div>

    <div class="grid" id="grid"></div>

    <!-- Bottom info bar like 1win: Max win | arrows + mine count -->
    <div class="bottom-info">
      <div class="bi-left">
        <span class="bi-icon">⭐</span>
        <div>
          <div class="bi-text">Maks. yutish</div>
          <div class="bi-val" id="maxWin2">—</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <div class="bi-center">
          <button class="bi-arr" onclick="changeMines(-1)">‹</button>
          <span class="bi-mine-num" id="minesNum2">1</span>
          <button class="bi-arr" onclick="changeMines(+1)">›</button>
        </div>
        <div class="bi-mine-lbl">lovushka</div>
      </div>
    </div>

    <div class="next-row" id="nextRow">
      <span class="nr-lbl">KEYINGI QADAM:</span>
      <div class="nm-b" id="nm1"></div>
      <div class="nm-b" id="nm2"></div>
      <div class="nm-b" id="nm3"></div>
      <div class="nm-b" id="nm4"></div>
    </div>

  </div>
</div>

<!-- WIN OVERLAY -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="pe" id="popEmoji">🎉</div>
    <h2 id="popTitle">G'ALABA!</h2>
    <p  id="popMsg">Tabriklaymiz!</p>
    <div class="ps" id="popScore">+500</div>
    <button class="btn-play" style="width:100%;" onclick="closeOverlay()">🔄 QAYTA O'YNASH</button>
  </div>
</div>

<script>
  /* ─── CONSTANTS ─── */
  const GRID = 25;

  const MULT_TABLE = {
    1:  [1.00,1.04,1.09,1.14,1.20,1.26,1.33,1.40,1.48,1.57,1.67,1.78,1.89,2.02,2.17,2.34,2.53,2.76,3.03,3.36,3.77,4.29,4.99,5.99,7.49],
    2:  [1.00,1.06,1.14,1.22,1.32,1.43,1.56,1.71,1.89,2.09,2.33,2.62,2.97,3.39,3.92,4.58,5.45,6.59,8.14,10.3,13.5,18.4,26.6,43.2],
    3:  [1.00,0.97,1.02,1.06,1.11,1.17,1.22,1.29,1.36,1.44,1.53,1.63,1.75,1.89,2.04,2.22,2.44,2.70,3.03,3.44,3.97,4.70,5.74,7.35],    5:  [1.00,1.17,1.40,1.70,2.11,2.67,3.47,4.62,6.36,9.13,13.8,22.1,38.0,71.4],
    7:  [1.00,1.30,1.84,2.64,3.88,5.82,8.96,14.1,23.0,38.8,68.5],
  };
  /* ─── STATE ─── */
  let bet         = 100;
  let mineCount   = 1;
  let mines       = [];
  let revealed    = [];
  let gameActive  = false;
  let revealPhase = false; // bomba chiqqandan keyin yulduzchalarni bittadan ochish rejimi
  let safeClicks  = 0;

  /* ─── HELPERS ─── */
  const $ = id => document.getElementById(id);
  const fmt = n => Number(n).toLocaleString('uz-UZ');

  function getMult(safe, m) {
    if (safe === 0) return 1.00;
    if (MULT_TABLE[m] && MULT_TABLE[m][safe] !== undefined)
      return +MULT_TABLE[m][safe].toFixed(2);
    let p = 1;
    for (let i = 0; i < safe; i++) p *= (GRID - m - i) / (GRID - i);
    return +(1 / p * 0.97).toFixed(2);
  }  function updateBalance() { /* balans yo'q */ }
  function updateMaxWin() {
    const maxMult = getMult(GRID - mineCount, mineCount);
    const val = fmt(Math.floor(bet * maxMult)) + ' UZS';
    $('maxWin').textContent = val;
    if ($('maxWin2')) $('maxWin2').textContent = val;
  }

  function updateStats() {
    if ($('safeStat')) $('safeStat').textContent = safeClicks;
    if ($('mineStat')) $('mineStat').textContent = mineCount;
    if ($('leftStat')) $('leftStat').textContent = GRID - safeClicks - mineCount;
  }

  function updateNextMults() {
    $('nextRow').style.display = 'flex';
    ['nm1','nm2','nm3','nm4'].forEach((id, i) => {
      $(id).textContent = 'x' + getMult(safeClicks + 1 + i, mineCount);
    });
  }

  function syncMinesUI() {
    document.querySelectorAll('.qb').forEach(b => b.classList.remove('active'));
    const qb = $('qm' + mineCount);
    if (qb) qb.classList.add('active');
    $('minesNum').textContent = mineCount;
    if ($('minesNum2')) $('minesNum2').textContent = mineCount;
    updateMaxWin();
  }
  const MINE_OPTIONS = [1, 3, 5, 7];

  function setMines(n) { if (!gameActive) { mineCount = n; syncMinesUI(); } }
  function changeMines(d) {
    if (gameActive) return;
    const idx = MINE_OPTIONS.indexOf(mineCount);
    const newIdx = Math.max(0, Math.min(MINE_OPTIONS.length - 1, idx + d));
    mineCount = MINE_OPTIONS[newIdx];
    syncMinesUI();
  }
  function adjustBet(d) {
    if (gameActive) return;
    bet = Math.max(10, bet + d);
    $('betInput').value = bet;
    updateMaxWin();
  }

  /* ─── GRID ─── */
  function buildGrid() {
    const g = $('grid');
    g.innerHTML = '';
    revealed = Array(GRID).fill(false);
    for (let i = 0; i < GRID; i++) {
      const c = document.createElement('div');
      c.className = 'cell';
      c.dataset.index = i;
      c.onclick = () => clickCell(i);
      g.appendChild(c);
    }
  }

  function placeMines() {
    mines = [];
    const pool = Array.from({length: GRID}, (_, i) => i);
    for (let i = 0; i < mineCount; i++)
      mines.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  /* ─── GAME ─── */
  function startGame() {
    bet = Math.max(10, parseInt($('betInput').value) || 100);
    gameActive  = true;
    revealPhase = false;
    safeClicks  = 0;
    placeMines();
    buildGrid();
    updateStats();    $('playBtn').style.display    = 'none';
    $('cashoutBtn').style.display = 'block';
    $('multBig').textContent      = 'x1.00';
    $('profitBox').style.display  = 'flex';
    $('profitVal').textContent    = '+0';
    if ($('minesNum2')) $('minesNum2').textContent = mineCount;
    updateNextMults();
  }
  function clickCell(idx) {
    const cell = document.querySelector(`.cell[data-index="${idx}"]`);
    if (!cell || revealed[idx]) return;

    // ── revealPhase: bomba portlagandan keyin xavfsiz katakchalarni bittadan ochish ──
    if (revealPhase) {
      if (mines.includes(idx)) return; // bombani qayta bosish mumkin emas
      revealed[idx] = true;
      cell.classList.remove('dis');
      cell.classList.add('s', 'dis');
      cell.innerHTML = '<span class="gem">⭐</span>';
      return;
    }

    if (!gameActive) return;

    revealed[idx] = true;

    if (mines.includes(idx)) {
      /* ── MINE HIT ── */
      cell.classList.add('m', 'dis');
      cell.innerHTML = '<span class="bomb">💣</span>';      gameActive = false;
      revealPhase = true; // endi xavfsiz katakchalarni ochish mumkin

      // Barcha bomba joylashuvlarini darhol "ochilgan" deb belgilab qo'y
      // (foydalanuvchi revealPhase da bombani bossa qaytsin)
      mines.forEach(i => { revealed[i] = true; });

      // Cashout tugmachasini yashir, O'YNASH ni ko'rsat
      $('playBtn').style.display    = 'block';
      $('cashoutBtn').style.display = 'none';
      $('multBig').textContent      = '';
      $('profitBox').style.display  = 'none';
      $('nextRow').style.display    = 'none';      // Qolgan bombalarni birin-ketin ochib ko'rsat (xavfsiz katakchalar OCHILMAYDI)
      // revealed[] allaqachon barcha bombalar uchun true qilingan (yuqorida)
      // Faqat ko'rinishini kechiktirish
      const remainingMines = mines.filter(i => i !== idx); // bosilgan bombadan boshqalar
      remainingMines.forEach((i, step) => {
        setTimeout(() => {
          const mc = document.querySelector(`.cell[data-index="${i}"]`);
          if (mc && !mc.classList.contains('m')) {
            mc.classList.add('m', 'dis');
            mc.innerHTML = '<span class="bomb">💣</span>';
          }
        }, 330 + step * 120);
      });

    } else {
      /* ── SAFE CELL ── */
      cell.classList.add('s', 'dis');
      cell.innerHTML = '<span class="gem">⭐</span>';
      safeClicks++;
      updateStats();

      const mult   = getMult(safeClicks, mineCount);
      const profit = Math.floor(bet * mult) - bet;
      $('multBig').textContent   = 'x' + mult;
      $('profitVal').textContent = '+' + fmt(Math.max(0, profit));
      updateNextMults();

      if (safeClicks === GRID - mineCount) cashOut();
    }
  }

  function cashOut() {
    if (!gameActive || safeClicks === 0) return;
    gameActive = false;    const mult = getMult(safeClicks, mineCount);
    const won  = Math.floor(bet * mult);

    $('playBtn').style.display    = 'block';
    $('cashoutBtn').style.display = 'none';
    $('multBig').textContent      = '';
    $('profitBox').style.display  = 'none';
    $('nextRow').style.display    = 'none';

    mines.forEach(m => {
      const mc = document.querySelector(`.cell[data-index="${m}"]`);
      if (mc && !revealed[m]) {
        mc.classList.add('m', 'dis');
        mc.innerHTML = '<span class="bomb">💣</span>';
      }
    });

    $('popEmoji').textContent = '🎉';
    $('popTitle').textContent = "G'ALABA!";
    $('popTitle').style.color = '#43e97b';
    $('popMsg').textContent   = `x${mult} koeffitsient bilan yutdingiz!`;
    $('popScore').textContent = '+' + fmt(won) + ' ⭐';
    $('popScore').style.color = '#f0c040';
    $('overlay').classList.add('show');
    spawnConfetti();
  }
  function closeOverlay() {    $('overlay').classList.remove('show');
    document.querySelectorAll('.confetti-piece').forEach(e => e.remove());
    safeClicks  = 0;
    revealPhase = false;
    buildGrid();
    updateStats();
    syncMinesUI();
    $('multBig').textContent     = '';
    $('nextRow').style.display   = 'none';
    $('profitBox').style.display = 'none';
  }

  function spawnConfetti() {
    const cols = ['#f0c040','#43e97b','#4facfe','#ff6b6b','#a18cd1','#ffd200'];
    for (let i = 0; i < 90; i++) {
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.cssText = `left:${Math.random()*100}%;top:-12px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${1.6+Math.random()*2}s;animation-delay:${Math.random()*0.5}s;width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3500);
      }, i * 18);
    }
  }
  /* ─── BET INPUT ─── */
  $('betInput').addEventListener('input', function() {
    bet = Math.max(10, parseInt(this.value) || 10);
    updateMaxWin();
  });

  /* ─── INIT ─── */
  buildGrid();
  updateStats();
  updateMaxWin();
</script>
</body>
</html>
