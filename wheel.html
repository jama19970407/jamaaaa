<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1x Ice Fishing - Wheel</title>
  <style>    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #b8d9e4 0%, #7ab3cc 40%, #4a82c8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family: 'Arial Black', Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 20px 0 30px;
    }

    /* === ICE background === */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(180deg, #ddeeff 0%, #b8d9e4 100%);
      z-index: 0;
    }    .game-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      width: 100%;
      max-width: 700px;
      padding: 6px 10px 12px;
    }    /* === WHEEL WRAPPER === */
    .wheel-wrapper {
      position: relative;
      width: min(680px, 96vw);
      height: min(680px, 96vw);
    }    canvas#wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
      position: relative;
      z-index: 2;
    }    /* === POINTER — Canvas da chiziladi, bu faqat anchor === */    canvas#lineCanvas {
      position: absolute;
      top: -40px; left: 0;
      width: 100%;
      height: calc(100% + 40px);
      z-index: 11;
      pointer-events: none;
    }
    .wheel-frame {
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      background: conic-gradient(
        #c8d8e8 0deg, #a0b8cc 10deg,
        #c8d8e8 10deg, #a0b8cc 20deg,
        #c8d8e8 20deg, #a0b8cc 30deg,
        #c8d8e8 30deg, #a0b8cc 40deg,
        #c8d8e8 40deg, #a0b8cc 50deg,
        #c8d8e8 50deg, #a0b8cc 60deg,
        #c8d8e8 60deg, #a0b8cc 70deg,
        #c8d8e8 70deg, #a0b8cc 80deg,
        #c8d8e8 80deg, #a0b8cc 90deg,
        #c8d8e8 90deg, #a0b8cc 100deg,
        #c8d8e8 100deg, #a0b8cc 110deg,
        #c8d8e8 110deg, #a0b8cc 120deg,
        #c8d8e8 120deg, #a0b8cc 130deg,
        #c8d8e8 130deg, #a0b8cc 140deg,
        #c8d8e8 140deg, #a0b8cc 150deg,
        #c8d8e8 150deg, #a0b8cc 160deg,
        #c8d8e8 160deg, #a0b8cc 170deg,
        #c8d8e8 170deg, #a0b8cc 180deg,
        #c8d8e8 180deg, #a0b8cc 190deg,
        #c8d8e8 190deg, #a0b8cc 200deg,
        #c8d8e8 200deg, #a0b8cc 210deg,
        #c8d8e8 210deg, #a0b8cc 220deg,
        #c8d8e8 220deg, #a0b8cc 230deg,
        #c8d8e8 230deg, #a0b8cc 240deg,
        #c8d8e8 240deg, #a0b8cc 250deg,
        #c8d8e8 250deg, #a0b8cc 260deg,
        #c8d8e8 260deg, #a0b8cc 270deg,
        #c8d8e8 270deg, #a0b8cc 280deg,
        #c8d8e8 280deg, #a0b8cc 290deg,
        #c8d8e8 290deg, #a0b8cc 300deg,
        #c8d8e8 300deg, #a0b8cc 310deg,
        #c8d8e8 310deg, #a0b8cc 320deg,
        #c8d8e8 320deg, #a0b8cc 330deg,
        #c8d8e8 330deg, #a0b8cc 340deg,
        #c8d8e8 340deg, #a0b8cc 350deg,
        #c8d8e8 350deg, #a0b8cc 360deg
      );      box-shadow: 0 0 0 4px #3a5a70, 0 8px 32px #0006;    }/* === CENTER LOGO === */
    .wheel-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      width: 23%;
      height: 23%;
      background: radial-gradient(circle, #e8f4f8, #b0ccd8);
      border-radius: 50%;
      border: 4px solid #8aacbe;
      box-shadow: 0 2px 12px #0005;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 900;
      color: #2a5a8a;
      text-align: center;
      letter-spacing: 1px;
      user-select: none;
    }    /* === BET BUTTONS === */
    .bet-section {
      width: 100%;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .fish-buttons {
      display: flex;      gap: 6px;
      justify-content: center;
    }

    .fish-btn {
      flex: 1;
      max-width: 100px;
      padding: 8px 6px 7px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: transform 0.1s, box-shadow 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      box-shadow: 0 3px 8px #0004;
      position: relative;
      overflow: hidden;
    }
    .fish-btn:active { transform: scale(0.95); }
    .fish-btn.selected {
      box-shadow: 0 0 0 3px #fff, 0 4px 16px #0006;
      transform: scale(1.05);
    }    .fish-btn .fish-icon {
      font-size: 20px;
      line-height: 1;
    }
    .fish-btn .fish-name {
      font-size: 10px;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 1px 3px #0007;
      line-height: 1.1;
      text-align: center;
    }
    .fish-btn .fish-odds {
      font-size: 9px;
      color: rgba(255,255,255,0.85);
    }

    .btn-blue {
      background: linear-gradient(135deg, #3a7fc1, #5aaee8);
    }
    .btn-orange {
      background: linear-gradient(135deg, #c17a1a, #e8a83a);
    }
    .btn-red {
      background: linear-gradient(135deg, #a01818, #d43030);
    }    /* === SPIN BUTTON === */
    .spin-btn {
      padding: 10px 22px;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 1px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #1a8a3a, #2ecc60);
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 16px #0a5a2080;
      transition: transform 0.1s, box-shadow 0.1s;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px #0a5a2099; }
    .spin-btn:active { transform: scale(0.97); }
    .spin-btn:disabled {
      background: linear-gradient(135deg, #555, #777);
      cursor: not-allowed;
      transform: none;
    }

    /* === RESULT POPUP === */
    .result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .result-overlay.show { display: flex; }
    .result-box {
      background: linear-gradient(135deg, #1a3a5a, #2a5a8a);
      border: 3px solid #5aaee8;
      border-radius: 24px;
      padding: 40px 50px;
      text-align: center;
      box-shadow: 0 8px 40px #000a;
      animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes popIn {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .result-icon { font-size: 64px; margin-bottom: 10px; }
    .result-title { font-size: 22px; color: #aaddff; margin-bottom: 6px; }
    .result-fish { font-size: 26px; font-weight: 900; margin-bottom: 16px; }    .result-win { font-size: 42px; font-weight: 900; color: #2ecc60; }
    .result-win.lose { color: #e74c3c; }
    .result-win:empty { display: none; }
    .result-close {
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      background: #5aaee8;
      color: #fff;
      cursor: pointer;
    }

    /* === LAST RESULTS === */
    .last-results {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }    .last-dot {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
    }

    /* === STATS === */
    .stats-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      font-size: 13px;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 3px #0005;
    }
    .stat-item { display: flex; align-items: center; gap: 4px; }
  </style>
</head>
<body>

<div class="game-container">
  <!-- Last results -->
  <div class="last-results" id="lastResults"></div>

  <!-- Wheel -->
  <div class="wheel-wrapper">    <div class="wheel-frame"></div>    <canvas id="wheel" width="680" height="680"></canvas>
    <canvas id="lineCanvas" width="680" height="720"></canvas>
    <div class="wheel-center">AI</div>
  </div>

  <!-- Bet section -->
  <div class="bet-section">

    <!-- Fish buttons -->
    <div class="fish-buttons">
      <button class="fish-btn btn-blue selected" id="btn-blue" onclick="selectFish('blue')">
        <span class="fish-icon">🐟</span>
        <span class="fish-name">LIL'<br>BLUES</span>
        <span class="fish-odds">x2</span>
      </button>
      <button class="fish-btn btn-orange" id="btn-orange" onclick="selectFish('orange')">
        <span class="fish-icon">🐠</span>
        <span class="fish-name">BIG<br>ORANGES</span>
        <span class="fish-odds">x14</span>
      </button>
      <button class="fish-btn btn-red" id="btn-red" onclick="selectFish('red')">
        <span class="fish-icon">🎣</span>
        <span class="fish-name">HUGE<br>REDS</span>
        <span class="fish-odds">x35</span>
      </button>
    </div>    <!-- Spin button -->
    <button class="spin-btn" id="spinBtn" onclick="spin()">🎣 TASHLASH</button>

  </div><!-- /bet-section -->

</div><!-- /game-container -->

<!-- Result popup -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-icon" id="resultIcon">🐟</div>
    <div class="result-title">G'ildirak to'xtadi:</div>
    <div class="result-fish" id="resultFish">LIL' BLUE</div>
    <div class="result-win" id="resultWin">+2,000</div>
    <button class="result-close" onclick="closeResult()">DAVOM ETISH</button>
  </div>
</div>

<script>
// ...existing code...
</script>
</body>
</html>
