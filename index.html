<html lang="uz">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0d1a;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ========= PRELOADER ========= */
        #preloader {
            position: fixed;
            inset: 0;
            background: #0a0d1a;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }
        #preloader.hide { opacity: 0; pointer-events: none; }
        .pre-logo { width: 160px; margin-bottom: 18px; filter: drop-shadow(0 0 18px #a259ff); }
        .pre-1win { width: 100px; margin-bottom: 28px; }
        .pre-bar-wrap {
            width: 220px; height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px; overflow: hidden;
        }
        .pre-bar {
            height: 100%;
            background: linear-gradient(90deg, #6b30f9, #a259ff);
            border-radius: 10px;
            animation: preBarAnim 1.8s ease-in-out forwards;
        }
        @keyframes preBarAnim { 0%{width:0} 100%{width:100%} }

        /* ========= TOP HEADER ========= */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            padding: 14px 16px 8px;
        }
        .logo-group { display: flex; align-items: center; gap: 10px; }
        .logo-group img { height: 36px; }
        .lucky-logo { height: 28px !important; }
        .live-badge {
            background: #e8003d;
            color: #fff;
            font-size: 11px;
            font-weight: 800;
            padding: 3px 9px;
            border-radius: 20px;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,100%{box-shadow:0 0 0 0 rgba(232,0,61,0.5)}
            50%{box-shadow:0 0 0 6px rgba(232,0,61,0)}
        }

        /* ========= GAME ARENA ========= */
        .arena {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 280px;
            background: linear-gradient(180deg, #0d1130 0%, #121828 100%);
            border-radius: 20px;
            overflow: hidden;
            margin: 0 12px;
            border: 1px solid rgba(107,48,249,0.3);
            box-shadow: 0 0 40px rgba(107,48,249,0.15);
        }

        /* Stars */
        .stars {
            position: absolute; inset: 0;
            background-image:
                radial-gradient(circle, rgba(255,255,255,0.9) 1px, transparent 1px),
                radial-gradient(circle, rgba(255,255,255,0.6) 1px, transparent 1px);
            background-size: 80px 80px, 40px 40px;
            background-position: 0 0, 20px 20px;
            opacity: 0.15;
        }

        /* CLOUDS */
        .cloud-layer {
            position: absolute;
            width: 100%; height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .cloud {
            position: absolute;
            opacity: 0.55;
        }
        .cloud-1 {
            width: 200px;
            top: 60%;
            animation: cloudMove1 8s linear infinite;
        }
        .cloud-2 {
            width: 140px;
            top: 30%;
            animation: cloudMove2 12s linear infinite;
            opacity: 0.3;
        }
        .cloud-3 {
            width: 170px;
            top: 75%;
            animation: cloudMove3 10s linear infinite;
            opacity: 0.4;
        }
        @keyframes cloudMove1 {
            from { left: 110%; }
            to   { left: -60%; }
        }
        @keyframes cloudMove2 {
            from { left: 130%; }
            to   { left: -50%; }
        }
        @keyframes cloudMove3 {
            from { left: 120%; }
            to   { left: -55%; }
        }

        /* TRAJECTORY LINE */
        .traj-svg {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }
        .traj-path {
            fill: none;
            stroke: rgba(162,89,255,0.5);
            stroke-width: 2;
            stroke-dasharray: 600;
            stroke-dashoffset: 600;
            transition: stroke-dashoffset 0.1s linear;
        }

        /* PLANE */
        #plane {
            position: absolute;
            width: 90px;
            bottom: 30px;
            left: 20px;
            transform-origin: center center;
            transition: left 0.1s linear, bottom 0.1s linear;
            filter: drop-shadow(0 0 8px rgba(162,89,255,0.6));
            z-index: 5;
        }

        /* EXPLOSION */
        #explosion {
            position: absolute;
            width: 110px;
            display: none;
            z-index: 10;
        }

        /* COEF DISPLAY */
        .coef-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -52%);
            text-align: center;
            z-index: 8;
            pointer-events: none;
        }
        .coef-value {
            font-size: 62px;
            font-weight: 900;
            letter-spacing: 2px;
            line-height: 1;
            color: #fff;
            text-shadow: 0 0 30px #a259ff, 0 0 60px rgba(162,89,255,0.4);
            transition: color 0.3s;

        .coef-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* PHASE LABELS */
        .phase-label {
            position: absolute;
            top: 12px; left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 16px;
            border-radius: 20px;
            z-index: 9;
        }
        .phase-label.betting {
            background: rgba(255,165,0,0.15);
            color: #ffa500;
            border: 1px solid rgba(255,165,0,0.4);
        }
        .phase-label.flying {
            background: rgba(168,255,94,0.1);
            color: #a8ff5e;
            border: 1px solid rgba(168,255,94,0.35);
        }
        .phase-label.crashed {
            background: rgba(232,0,61,0.15);
            color: #e8003d;
            border: 1px solid rgba(232,0,61,0.4);
        }

        /* PROGRESS BAR (betting countdown) */
        .bet-timer-wrap {
            position: absolute;
            bottom: 12px; left: 50%;
            transform: translateX(-50%);
            width: 80%;
        }
        .bet-timer-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .bet-timer-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #ffa500, #ff6a00);
            transition: width 0.1s linear;
        }
        .bet-timer-txt {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
            text-align: center;
        }

        /* ========= HISTORY PILLS ========= */
        .history-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            width: 100%;
            max-width: 400px;
            padding: 10px 16px;
        }
        .hist-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
            animation: popIn 0.3s ease;
        }

        .hist-blue   { background: #1e3a8a; color: #93c5fd; }
        .hist-purple { background: #4c1d95; color: #c4b5fd; }
        .hist-orange { background: #7c2d12; color: #fdba74; }
        .hist-red    { background: #7f1d1d; color: #fca5a5; }
        .hist-green  { background: #14532d; color: #86efac; }

        /* ========= SIGNAL CARD ========= */
        .signal-card {
            width: 100%;
            max-width: 400px;
            margin: 6px 12px;
            background: linear-gradient(135deg, #131629 0%, #1a1d35 100%);

        .signal-val {
            font-size: 42px;

            letter-spacing: 2px;
        }
        .signal-sub {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }

        /* ========= INPUT + BUTTON ========= */
        .input-section {
            width: 100%;
            max-width: 400px;
            padding: 4px 16px 8px;
        }        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            width: 100%;
        }
        .bet-input {
            flex: 1;
            height: 48px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(107,48,249,0.4);
            border-radius: 12px;

        }
        .bet-input:focus { border-color: #a259ff; box-shadow: 0 0 12px rgba(162,89,255,0.3); }
        .bet-input::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; }        .calc-btn {
            height: 48px;
            padding: 0 18px;
            background: linear-gradient(135deg, #6b30f9 0%, #a259ff 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            cursor: pointer;
            letter-spacing: 0.5px;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(107,48,249,0.4);
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            width: 100%;
        }
        .calc-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(107,48,249,0.6); }
        .calc-btn:active:not(:disabled) { transform: translateY(0); }
        .calc-btn:disabled { cursor: not-allowed; }

        /* ========= PREDICTION RESULT ========= */
        .pred-result {
            background: linear-gradient(135deg, rgba(107,48,249,0.15), rgba(162,89,255,0.08));
            border: 2px solid rgba(162,89,255,0.3);
            border-radius: 14px;
            padding: 14px 18px;
            display: none;
            align-items: center;
            justify-content: space-between;
            animation: slideUp 0.4s ease;
        }
        .pred-result.show { display: flex; }
        @keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .pred-left { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 600; }
        .pred-coef {
            font-size: 32px;
            font-weight: 900;
            color: #a259ff;
            text-shadow: 0 0 15px rgba(162,89,255,0.6);
        }

        /* ========= GO TO GAME BTN ========= */
        .go-btn {
            display: block;
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #6b30f9, #a259ff);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 17px;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 1px;

            margin-top: 10px;

        }
        .go-btn:hover { transform: scale(1.02); }

        /* ========= WIN FLASH ========= */
        #winFlash {
            position: fixed;
            inset: 0;
            background: rgba(168,255,94,0.08);
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #winFlash.show { opacity: 1; }

        /* scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #6b30f9; border-radius: 4px; }
    </style>
</head>

<script>
// ============================================================
//  LUCKY JET — FULL GAME SIMULATION
//  Tsikl: 3s betting → 6s uchish (0.00x → tasodifiy) → crash
// ============================================================

// ---- HISTORY ----
let historyArr = [];
function addHistory(coef) {
    historyArr.unshift(parseFloat(coef));
    if (historyArr.length > 12) historyArr.pop();
    renderHistory();
}
function pillClass(v) {
    if (v < 1.5)  return 'hist-red';
    if (v < 2.0)  return 'hist-blue';
    if (v < 5.0)  return 'hist-purple';
    if (v < 10.0) return 'hist-orange';
    return 'hist-green';
}
function renderHistory() {
    const row = document.getElementById('historyRow');
    row.innerHTML = historyArr.map(v =>
        `<span class="hist-pill ${pillClass(v)}">${v.toFixed(2)}x</span>`
    ).join('');
}

// ---- COEFFICIENT GENERATOR ----
function genCrashCoef() {
    const r = Math.random() * 100;
    if (r < 55) return +(Math.random() * (2.0 - 1.01) + 1.01).toFixed(2);
    if (r < 80) return +(Math.random() * (5.0 - 2.0) + 2.0).toFixed(2);
    if (r < 93) return +(Math.random() * (10.0 - 5.0) + 5.0).toFixed(2);
    return +(Math.random() * (50.0 - 10.0) + 10.0).toFixed(2);
}
function genNext(last) {
    last = parseFloat(last);
    const r = Math.random() * 100;
    if (last >= 10) {
        if (r < 75) return (Math.random()*(2.0-1.01)+1.01).toFixed(2);
        if (r < 92) return (Math.random()*(5.0-2.0)+2.0).toFixed(2);
        if (r < 98) return (Math.random()*(10.0-5.0)+5.0).toFixed(2);
        return (Math.random()*(50.0-10.0)+10.0).toFixed(2);
    } else if (last >= 5) {
        if (r < 68) return (Math.random()*(2.0-1.01)+1.01).toFixed(2);
        if (r < 88) return (Math.random()*(5.0-2.0)+2.0).toFixed(2);
        if (r < 97) return (Math.random()*(10.0-5.0)+5.0).toFixed(2);
        return (Math.random()*(50.0-10.0)+10.0).toFixed(2);
    } else if (last >= 2) {
        if (r < 58) return (Math.random()*(2.0-1.01)+1.01).toFixed(2);
        if (r < 82) return (Math.random()*(5.0-2.0)+2.0).toFixed(2);
        if (r < 93) return (Math.random()*(10.0-5.0)+5.0).toFixed(2);
        return (Math.random()*(50.0-10.0)+10.0).toFixed(2);
    } else {
        if (r < 48) return (Math.random()*(2.0-1.01)+1.01).toFixed(2);
        if (r < 76) return (Math.random()*(5.0-2.0)+2.0).toFixed(2);
        if (r < 92) return (Math.random()*(10.0-5.0)+5.0).toFixed(2);
        return (Math.random()*(50.0-10.0)+10.0).toFixed(2);
    }
}

// ---- DOM refs ----
const plane       = document.getElementById('plane');
const explosion   = document.getElementById('explosion');
const coefDisplay = document.getElementById('coefDisplay');
const coefLabel   = document.getElementById('coefLabel');
const phaseLabel  = document.getElementById('phaseLabel');
const betWrap     = document.getElementById('betTimerWrap');
const betFill     = document.getElementById('betTimerFill');
const betTxt      = document.getElementById('betTimerTxt');
const trajPath    = document.getElementById('trajPath');
const winFlash    = document.getElementById('winFlash');
const arena       = document.getElementById('arena');

// ---- GAME STATE ----
const BETTING_DURATION = 3000;   // 3 soniya
const FLYING_DURATION  = 6000;   // 6 soniya

let gamePhase   = 'betting';  // 'betting' | 'flying' | 'crashed'
let crashCoef   = 1.00;
let flyStart    = 0;
let phaseStart  = 0;
let animFrameId = null;

// plane start / end positions (% of arena)
const PLANE_START = { x: 5, y: 82 };   // bottom-left (% from left, % from top)
const PLANE_END   = { x: 82, y: 8 };   // top-right

function lerp(a, b, t) { return a + (b - a) * t; }

function setPhaseLabel(text, cls) {
    phaseLabel.textContent = text;
    phaseLabel.className   = 'phase-label ' + cls;
}

// ---- TRAJECTORY dash animation ----
function setTrajProgress(t) {
    const len = 600;
    trajPath.style.strokeDashoffset = (len * (1 - t)).toFixed(1);
}

// ---- PLANE position ----
function setPlanePos(t) {
    const arenaW = arena.offsetWidth  || 360;
    const arenaH = arena.offsetHeight || 280;

    const pxStart = { x: arenaW * 0.05, y: arenaH * 0.80 };
    const pxEnd   = { x: arenaW * 0.82, y: arenaH * 0.05 };

    // Curve using easing
    const ease = 1 - Math.pow(1 - t, 2); // ease-out quad
    const x = lerp(pxStart.x, pxEnd.x, ease);
    const y = lerp(pxStart.y, pxEnd.y, ease);

    // Angle
    const dx = (pxEnd.x - pxStart.x);
    const dy = (pxEnd.y - pxStart.y);
    const baseAngle = Math.atan2(dy, dx) * (180 / Math.PI);
    const angle = baseAngle * ease;   // gentle tilt

    plane.style.left   = (x - 45) + 'px';
    plane.style.top    = (y - 30) + 'px';
    plane.style.bottom = 'unset';
    plane.style.transform = `rotate(${angle}deg)`;
}

// ---- COEF counter ----
function calcCurrentCoef(t) {
    // 0 → crashCoef over t=0..1
    return (1.0 + (crashCoef - 1.0) * Math.pow(t, 0.8)).toFixed(2);
}

// ---- PHASE: BETTING ----
function startBetting() {
    gamePhase  = 'betting';
    phaseStart = performance.now();
    crashCoef  = genCrashCoef();

    // Reset plane
    const arenaW = arena.offsetWidth  || 360;
    const arenaH = arena.offsetHeight || 280;
    plane.style.left      = (arenaW * 0.05 - 45) + 'px';
    plane.style.top       = (arenaH * 0.80 - 30) + 'px';
    plane.style.bottom    = 'unset';
    plane.style.transform = 'rotate(0deg)';
    plane.style.display   = 'block';
    explosion.style.display = 'none';

    // Traj reset
    setTrajProgress(0);

    // Coef
    coefDisplay.textContent = '0.00x';
    coefDisplay.className   = 'coef-value';
    coefLabel.textContent   = 'Stavka qo\'ying';

    setPhaseLabel('🎰 Stavka qo\'ying', 'betting');
    betWrap.style.display = 'block';

    cancelAnimationFrame(animFrameId);
    animFrameId = requestAnimationFrame(bettingLoop);
}

function bettingLoop(now) {
    const elapsed = now - phaseStart;
    const t       = Math.min(elapsed / BETTING_DURATION, 1);
    const remain  = Math.max((BETTING_DURATION - elapsed) / 1000, 0);

    betFill.style.width  = ((1 - t) * 100) + '%';
    betTxt.textContent   = `Raund boshlanishiga: ${remain.toFixed(1)}s`;

    if (t < 1) {
        animFrameId = requestAnimationFrame(bettingLoop);
    } else {
        startFlying();
    }
}

// ---- PHASE: FLYING ----
function startFlying() {
    gamePhase  = 'flying';
    phaseStart = performance.now();

    betWrap.style.display = 'none';
    setPhaseLabel('✈️ Uchmoqda!', 'flying');
    coefDisplay.className = 'coef-value flying';
    coefLabel.textContent = 'uchmoqda...';

    cancelAnimationFrame(animFrameId);
    animFrameId = requestAnimationFrame(flyingLoop);
}

function flyingLoop(now) {
    const elapsed = now - phaseStart;
    const t       = Math.min(elapsed / FLYING_DURATION, 1);

    // Plane position
    setPlanePos(t);

    // Trajectory
    setTrajProgress(t);

    // Coef (starts at 0, ends at crashCoef)
    const cur = calcCurrentCoef(t);
    coefDisplay.textContent = cur + 'x';

    if (t < 1) {
        animFrameId = requestAnimationFrame(flyingLoop);
    } else {
        startCrashed();
    }
}

// ---- PHASE: CRASHED ----
function startCrashed() {
    gamePhase = 'crashed';
    cancelAnimationFrame(animFrameId);

    // Plane → explosion
    plane.style.display = 'none';

    const arenaW = arena.offsetWidth  || 360;
    const arenaH = arena.offsetHeight || 280;
    explosion.style.left    = (arenaW * 0.78 - 55) + 'px';
    explosion.style.top     = (arenaH * 0.02) + 'px';
    explosion.style.display = 'block';
    explosion.style.bottom  = 'unset';

    // Final coef
    coefDisplay.textContent = crashCoef.toFixed(2) + 'x';
    coefDisplay.className   = 'coef-value crashed';
    coefLabel.textContent   = '💥 Parvoz tugadi!';

    setPhaseLabel('💥 CRASH!', 'crashed');

    addHistory(crashCoef);

    // Flash if good
    if (crashCoef >= 2) {
        winFlash.classList.add('show');
        setTimeout(() => winFlash.classList.remove('show'), 600);
    }

    // Wait 2.5s then bet again
    setTimeout(startBetting, 2500);
}

// ---- PRELOADER ----
window.addEventListener('DOMContentLoaded', () => {
    // Initial history
    [1.42, 3.87, 1.12, 7.50, 2.34, 1.09, 4.22, 12.10].forEach(v => {
        historyArr.push(v);
    });
    renderHistory();

    setTimeout(() => {
        const pre = document.getElementById('preloader');
        pre.classList.add('hide');
        setTimeout(() => pre.remove(), 900);
        // Samolyotni pastda kutish holatida qo'yamiz — harakat yo'q
        resetToIdle();
    }, 1900);
});

// ---- IDLE (kutish) holati ----
function resetToIdle() {
    gamePhase = 'idle';
    cancelAnimationFrame(animFrameId);

    const arenaW = arena.offsetWidth  || 360;
    const arenaH = arena.offsetHeight || 280;
    plane.style.left      = (arenaW * 0.05 - 45) + 'px';
    plane.style.top       = (arenaH * 0.80 - 30) + 'px';
    plane.style.bottom    = 'unset';
    plane.style.transform = 'rotate(0deg)';
    plane.style.display   = 'block';
    explosion.style.display = 'none';
    setTrajProgress(0);

    coefDisplay.textContent = '—';
    coefDisplay.className   = 'coef-value';
    coefLabel.textContent   = 'signal kuting...';
    setPhaseLabel('⏳ Signal kuting', 'betting');
    betWrap.style.display = 'none';
}

// ---- SIGNAL BUTTON ----
document.getElementById('calcBtn').addEventListener('click', () => {
    const btn = document.getElementById('calcBtn');

    // Tugmani vaqtincha o'chirish
    btn.disabled = true;
    btn.textContent = '⏳ Analizlanmoqda...';
    btn.style.opacity = '0.7';

    // Avvalgi animatsiyani to'xtatish
    cancelAnimationFrame(animFrameId);

    // Signal generatsiya — uchish uchun ishlatiladi
    const nextVal = parseFloat(genCrashCoef().toFixed(2));
    const nextStr = nextVal.toFixed(2);
    crashCoef = nextVal; // samolyot shu koefga qadar uchadi

    // Rang
    let coefColor = '#a259ff';
    if (nextVal >= 10) coefColor = '#ff4444';
    else if (nextVal >= 5) coefColor = '#ff9900';
    else if (nextVal >= 2) coefColor = '#ffe000';    // Ikkalasini bir xil qiymat bilan yangilash
    const signalEl  = document.getElementById('signalVal');
    signalEl.textContent  = 'x' + nextStr;
    signalEl.style.color  = coefColor;
    document.getElementById('signalSub').textContent = 'Keyingi raund analiz koeffitsienti';

    // 1.2s keyin samolyot uchishni BOSHLAYDI (betting o'tkazib yuboriladi)
    setTimeout(() => {
        // Plane reset
        const arenaW = arena.offsetWidth  || 360;
        const arenaH = arena.offsetHeight || 280;
        plane.style.left      = (arenaW * 0.05 - 45) + 'px';
        plane.style.top       = (arenaH * 0.80 - 30) + 'px';
        plane.style.bottom    = 'unset';
        plane.style.transform = 'rotate(0deg)';
        plane.style.display   = 'block';
        explosion.style.display = 'none';
        setTrajProgress(0);

        // Tugmani qaytarish
        btn.disabled = false;
        btn.textContent = '📡 SIGNAL OLISH';
        btn.style.opacity = '1';

        // To'g'ridan-to'g'ri uchishni boshlash
        startFlying();
    }, 1200);
});
</script>
