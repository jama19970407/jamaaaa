<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>💣 Mines Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    /* Stars background */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; }
      to   { opacity: 1; }
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 30px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    /* LEFT PANEL */
    .left-panel {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      width: 220px;
      backdrop-filter: blur(10px);
    }

    .left-panel h2 {
      font-size: 22px;
      font-weight: 800;
      color: #f0c040;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 2px;
    }

    .label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-display {
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 22px;
      font-weight: 700;
      color: #f0c040;
      text-align: center;
      margin-bottom: 16px;
      border: 1px solid rgba(240,192,64,0.3);
    }    .mines-selector {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.1);
    }.mine-pick-btn {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      width: 44px; height: 44px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mine-pick-btn:hover { background: rgba(255,100,100,0.25); border-color: #ff6b6b; }
    .mine-pick-btn.active-mine {
      background: rgba(255,80,80,0.3);
      border-color: #ff4444;
      color: #ff6b6b;
      box-shadow: 0 0 12px rgba(255,68,68,0.4);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .btn-play {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: #111;
    }
    .btn-play:hover { transform: scale(1.03); box-shadow: 0 0 20px #43e97b88; }

    .btn-cashout {
      background: linear-gradient(135deg, #f7971e, #ffd200);
      color: #111;
      display: none;
    }
    .btn-cashout:hover { transform: scale(1.03); box-shadow: 0 0 20px #ffd20088; }

    .multiplier {
      text-align: center;
      font-size: 28px;
      font-weight: 900;
      color: #43e97b;
      margin: 10px 0;
      text-shadow: 0 0 20px #43e97b;
      min-height: 40px;
    }

    .status-msg {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      min-height: 20px;
    }

    /* GRID */
    .grid-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .title {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 4px;
      color: #f0c040;
      text-shadow: 0 0 30px #f0c04088;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      background: rgba(255,255,255,0.03);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .cell {
      width: 80px;
      height: 80px;
      border-radius: 14px;
      background: linear-gradient(145deg, #2a3f6f, #1a2a4f);
      border: 2px solid rgba(100,160,255,0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      transition: all 0.15s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .cell::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to bottom, rgba(255,255,255,0.08), transparent);
      border-radius: 12px 12px 0 0;
    }

    .cell:hover:not(.revealed):not(.disabled) {
      background: linear-gradient(145deg, #3a5080, #2a3a60);
      border-color: rgba(100,180,255,0.6);
      transform: scale(1.08) translateY(-3px);
      box-shadow: 0 8px 25px rgba(50,120,255,0.4);
    }

    .cell.safe {
      background: linear-gradient(145deg, #1a4a2a, #0f3a1f);
      border-color: #43e97b;
      box-shadow: 0 0 20px rgba(67,233,123,0.4);
      cursor: default;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .cell.mine {
      background: linear-gradient(145deg, #5a1a1a, #3a0f0f);
      border-color: #ff4444;
      box-shadow: 0 0 20px rgba(255,68,68,0.5);
      cursor: default;
      animation: shake 0.4s ease;
    }

    .cell.disabled {
      cursor: default;
      opacity: 0.7;
    }

    @keyframes popIn {
      0%   { transform: scale(0.8); }
      70%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    /* STATS */
    .stats-row {
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .stat-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 10px 20px;
      text-align: center;
    }
    .stat-box .val { font-size: 20px; font-weight: 700; color: #f0c040; }
    .stat-box .lbl { font-size: 11px; color: #888; }

    /* WIN/LOSE overlay */
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    .overlay.show { display: flex; }

    .popup {
      background: linear-gradient(135deg, #1a2a4a, #0f1a30);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      max-width: 360px;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .popup .emoji { font-size: 64px; margin-bottom: 16px; }
    .popup h2 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    .popup p { color: #aaa; margin-bottom: 24px; font-size: 15px; }
    .popup .big-score { font-size: 36px; font-weight: 900; color: #f0c040; margin-bottom: 20px; }

    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: fall 2s linear forwards;
      z-index: 200;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 600px) {
      .cell { width: 55px; height: 55px; font-size: 22px; }
      .container { gap: 15px; }
      .left-panel { width: 100%; }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <!-- LEFT PANEL -->
  <div class="left-panel">
    <h2>💣 MINES</h2>

    <div class="label">Ball</div>
    <div class="score-display" id="scoreDisplay">1000</div>    <div class="label">Minalar soni</div>
    <div class="mines-selector" style="justify-content:center; gap:8px; flex-wrap:wrap; padding:10px;">      <button onclick="selectMines(1)" id="mineBtn1" class="mine-pick-btn active-mine">1</button>
      <button onclick="selectMines(3)" id="mineBtn3" class="mine-pick-btn">3</button>
      <button onclick="selectMines(5)" id="mineBtn5" class="mine-pick-btn">5</button>
      <button onclick="selectMines(7)" id="mineBtn7" class="mine-pick-btn">7</button>
    </div>

    <div class="multiplier" id="multiplierDisplay"></div>

    <button class="btn btn-play" id="playBtn" onclick="startGame()">▶ BOSHLASH</button>
    <button class="btn btn-cashout" id="cashoutBtn" onclick="cashOut()">💰 OLISH</button>

    <div class="status-msg" id="statusMsg">Minalar sonini tanlang va boshlang!</div>
  </div>

  <!-- GRID -->
  <div class="grid-wrapper">
    <div class="title">⭐ CAVEMINES</div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="val" id="safeStat">0</div>
        <div class="lbl">Ochilgan</div>
      </div>
      <div class="stat-box">
        <div class="val" id="mineStat" style="color:#ff6b6b">3</div>
        <div class="lbl">Mina</div>
      </div>
      <div class="stat-box">
        <div class="val" id="leftStat">25</div>
        <div class="lbl">Qolgan</div>
      </div>
    </div>    <div class="grid" id="grid"></div>

    <!-- Keyingi koeffitsientlar paneli -->
    <div id="nextMultsPanel" style="display:none; gap:8px; align-items:center; background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:10px 16px; flex-wrap:wrap; justify-content:center;">
      <span style="font-size:11px;color:#aaa;letter-spacing:1px;">KEYINGI QADAM:</span>
      <div class="nm-cell" style="background:rgba(240,192,64,0.15);border:1px solid rgba(240,192,64,0.4);color:#f0c040;font-weight:700;font-size:14px;padding:5px 12px;border-radius:8px;"></div>
      <div class="nm-cell" style="background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.25);color:#f0c040;font-weight:700;font-size:14px;padding:5px 12px;border-radius:8px;opacity:0.8"></div>
      <div class="nm-cell" style="background:rgba(240,192,64,0.07);border:1px solid rgba(240,192,64,0.15);color:#f0c040;font-weight:700;font-size:14px;padding:5px 12px;border-radius:8px;opacity:0.6"></div>
      <div class="nm-cell" style="background:rgba(240,192,64,0.04);border:1px solid rgba(240,192,64,0.1);color:#f0c040;font-weight:700;font-size:14px;padding:5px 12px;border-radius:8px;opacity:0.4"></div>
    </div>
  </div>
</div>

<!-- WIN/LOSE OVERLAY -->
<div class="overlay" id="overlay">
  <div class="popup" id="popup">
    <div class="emoji" id="popupEmoji">🎉</div>
    <h2 id="popupTitle">G'ALABA!</h2>
    <p id="popupMsg">Tabriklaymiz!</p>
    <div class="big-score" id="popupScore">+500</div>
    <button class="btn btn-play" onclick="closeOverlay()" style="margin:0">🔄 QAYTA O'YNASH</button>
  </div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for(let i = 0; i < 120; i++){
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${1+Math.random()*3}s`;
    starsEl.appendChild(s);
  }
  // Game State
  let score = 1000;
  let mineCount = 1;
  let mines = [];
  let revealed = [];
  let gameActive = false;
  let safeClicks = 0;
  const GRID_SIZE = 25;
  // Multiplier table — 1win CaveMines real koeffitsientlari (rasmdan olindi)
  const MULT_TABLE = {
    1:  [1.00, 1.04, 1.09, 1.14, 1.20, 1.26, 1.33, 1.40, 1.48, 1.57, 1.67, 1.78, 1.89, 2.02, 2.17, 2.34, 2.53, 2.76, 3.03, 3.36, 3.77, 4.29, 4.99, 5.99, 7.49],
    2:  [1.00, 1.06, 1.14, 1.22, 1.32, 1.43, 1.56, 1.71, 1.89, 2.09, 2.33, 2.62, 2.97, 3.39, 3.92, 4.58, 5.45, 6.59, 8.14, 10.3, 13.5, 18.4, 26.6, 43.2],
    3:  [1.00, 0.97, 1.02, 1.06, 1.11, 1.17, 1.22, 1.29, 1.36, 1.44, 1.53, 1.63, 1.75, 1.89, 2.04, 2.22, 2.44, 2.70, 3.03, 3.44, 3.97, 4.70, 5.74, 7.35],
    5:  [1.00, 1.17, 1.40, 1.70, 2.11, 2.67, 3.47, 4.62, 6.36, 9.13, 13.8, 22.1, 38.0, 71.4],
    7:  [1.00, 1.30, 1.84, 2.64, 3.88, 5.82, 8.96, 14.1, 23.0, 38.8, 68.5],
  };

  function getMultiplier(safe, totalMines) {
    if(safe === 0) return 1.00;
    // Agar jadvalda bo'lsa — jadvaldan ol
    if(MULT_TABLE[totalMines] && MULT_TABLE[totalMines][safe] !== undefined){
      return +MULT_TABLE[totalMines][safe].toFixed(2);
    }
    // Boshqa minalar uchun matematik formula
    let mult = 1;
    for(let i = 0; i < safe; i++){
      mult *= (GRID_SIZE - totalMines - i) / (GRID_SIZE - i);
    }
    return +(1 / mult * 0.97).toFixed(2);
  }
  function selectMines(count){
    if(gameActive) return;
    mineCount = count;
    document.querySelectorAll('.mine-pick-btn').forEach(btn => btn.classList.remove('active-mine'));
    document.getElementById('mineBtn' + count).classList.add('active-mine');
    document.getElementById('mineStat').textContent = mineCount;
    document.getElementById('leftStat').textContent = GRID_SIZE;
  }

  function changeMines(delta){
    if(gameActive) return;
    mineCount = Math.max(1, Math.min(20, mineCount + delta));
    document.getElementById('mineCount').textContent = mineCount;
    document.getElementById('mineStat').textContent = mineCount;
    document.getElementById('leftStat').textContent = GRID_SIZE;
  }

  function buildGrid(){
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    revealed = new Array(GRID_SIZE).fill(false);
    for(let i = 0; i < GRID_SIZE; i++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.index = i;
      cell.onclick = () => clickCell(i);
      grid.appendChild(cell);
    }
  }

  function placeMines(){
    mines = [];
    let pool = Array.from({length: GRID_SIZE}, (_, i) => i);
    for(let i = 0; i < mineCount; i++){
      const idx = Math.floor(Math.random() * pool.length);
      mines.push(pool[idx]);
      pool.splice(idx, 1);
    }
  }

  function startGame(){
    if(score <= 0){
      document.getElementById('statusMsg').textContent = '❌ Ball yetarli emas!';
      return;
    }    gameActive = true;
    safeClicks = 0;
    placeMines();
    buildGrid();
    updateStats();
    document.getElementById('playBtn').style.display = 'none';
    document.getElementById('cashoutBtn').style.display = 'block';
    document.getElementById('multiplierDisplay').textContent = 'x1.00';
    document.getElementById('statusMsg').textContent = '🎯 Xavfsiz katakni bosing!';
    updateNextMults();
  }

  function clickCell(index){
    if(!gameActive || revealed[index]) return;
    revealed[index] = true;
    const cell = document.querySelector(`.cell[data-index="${index}"]`);

    if(mines.includes(index)){
      // MINE!
      cell.classList.add('mine');
      cell.textContent = '💣';
      gameActive = false;
      // Show all mines
      setTimeout(() => {
        mines.forEach(m => {
          const mc = document.querySelector(`.cell[data-index="${m}"]`);
          if(!revealed[m]){ mc.classList.add('mine'); mc.textContent = '💣'; }
          mc.classList.add('disabled');
        });
        showResult(false);
      }, 300);    } else {
      // SAFE!
      cell.classList.add('safe');
      cell.textContent = '⭐';
      safeClicks++;
      updateStats();
      const mult = getMultiplier(safeClicks, mineCount);
      document.getElementById('multiplierDisplay').textContent = `x${mult}`;
      document.getElementById('statusMsg').textContent = `✅ Xavfsiz! x${mult} koeffitsient`;
      updateNextMults();

      // Auto win if all safe cells revealed
      if(safeClicks === GRID_SIZE - mineCount){
        cashOut();
      }
    }
  }

  function cashOut(){
    if(!gameActive || safeClicks === 0) return;
    gameActive = false;
    const mult = getMultiplier(safeClicks, mineCount);
    const won = Math.floor(score * 0.1 * mult);
    score += won;
    updateScoreDisplay();
    document.getElementById('playBtn').style.display = 'block';
    document.getElementById('cashoutBtn').style.display = 'none';
    document.getElementById('multiplierDisplay').textContent = '';
    revealAllMines();
    showResult(true, won, mult);
  }

  function revealAllMines(){
    mines.forEach(m => {
      const mc = document.querySelector(`.cell[data-index="${m}"]`);
      if(mc && !revealed[m]){
        mc.classList.add('mine', 'disabled');
        mc.textContent = '💣';
      }
    });
  }

  function showResult(win, won=0, mult=1){
    document.getElementById('playBtn').style.display = 'block';
    document.getElementById('cashoutBtn').style.display = 'none';

    const overlay = document.getElementById('overlay');
    const emoji = document.getElementById('popupEmoji');
    const title = document.getElementById('popupTitle');
    const msg = document.getElementById('popupMsg');
    const sc = document.getElementById('popupScore');

    if(win){
      emoji.textContent = '🎉';
      title.textContent = "G'ALABA!";
      title.style.color = '#43e97b';
      msg.textContent = `x${mult} koeffitsient bilan yutdingiz!`;
      sc.textContent = `+${won} ball`;
      sc.style.color = '#43e97b';
      spawnConfetti();
    } else {
      emoji.textContent = '💣';
      title.textContent = "PORTLADI!";
      title.style.color = '#ff4444';
      msg.textContent = 'Minaga tegdingiz!';
      sc.textContent = 'Yutqazdingiz!';
      sc.style.color = '#ff4444';
    }
    overlay.classList.add('show');
  }
  function closeOverlay(){
    document.getElementById('overlay').classList.remove('show');
    buildGrid();
    updateStats();
    document.getElementById('multiplierDisplay').textContent = '';
    document.getElementById('statusMsg').textContent = 'Boshlash tugmasini bosing!';
    document.getElementById('nextMultsPanel').style.display = 'none';
    // Remove confetti
    document.querySelectorAll('.confetti-piece').forEach(e => e.remove());
  }

  function updateNextMults(){
    const panel = document.getElementById('nextMultsPanel');
    const cells = panel.querySelectorAll('.nm-cell');
    cells.forEach((el, i) => {
      const m = getMultiplier(safeClicks + 1 + i, mineCount);
      el.textContent = `x${m}`;
    });
    panel.style.display = 'flex';
  }

  function updateStats(){
    document.getElementById('safeStat').textContent = safeClicks;
    document.getElementById('mineStat').textContent = mineCount;
    document.getElementById('leftStat').textContent = GRID_SIZE - safeClicks - mineCount;
  }

  function updateScoreDisplay(){
    document.getElementById('scoreDisplay').textContent = score.toLocaleString();
  }

  function spawnConfetti(){
    const colors = ['#f0c040','#43e97b','#4facfe','#ff6b6b','#a18cd1','#ffecd2'];
    for(let i = 0; i < 80; i++){
      setTimeout(() => {
        const c = document.createElement('div');
        c.className = 'confetti-piece';
        c.style.cssText = `
          left:${Math.random()*100}%;
          top:-10px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          animation-duration:${1.5+Math.random()*2}s;
          animation-delay:${Math.random()*0.5}s;
          transform:rotate(${Math.random()*360}deg);
          width:${6+Math.random()*10}px;
          height:${6+Math.random()*10}px;
        `;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
      }, i * 20);
    }
  }

  // Init
  buildGrid();
  updateScoreDisplay();
  updateStats();
</script>
</body>
</html>
