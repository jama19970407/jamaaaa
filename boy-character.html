<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucky Jet — Simulation</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: radial-gradient(ellipse at 60% 40%, #1a1060 0%, #0d0a2e 50%, #080620 100%);
  font-family: 'Arial Black', 'Arial', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}

/* ===== CANVASES ===== */
#starCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}
#gridCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 1;
}
#gameCanvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 3;
}

/* ===== BULUTLAR ===== */
#cloudLayer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 2;
  overflow: hidden;
}
.cloud {
  position: absolute;
  background: url('./images/obl.svg') no-repeat center / contain;
  pointer-events: none;
}
.cloud-1 { width: 480px; height: 155px; bottom: 6%;  left: -4%;  opacity: 0.28; }
.cloud-2 { width: 360px; height: 116px; bottom: 20%; left: 18%;  opacity: 0.18; }
.cloud-3 { width: 560px; height: 180px; bottom: 2%;  left: 42%;  opacity: 0.25; }
.cloud-4 { width: 300px; height: 97px;  bottom: 28%; left: 63%;  opacity: 0.15; }
.cloud-5 { width: 420px; height: 135px; bottom: 10%; left: 78%;  opacity: 0.22; }

/* ===== KOEFFITSIENT ===== */
#coefDisplay {
  position: absolute;
  top: 38%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 86px;
  font-weight: 900;
  color: #c8ff00;
  text-shadow: 0 0 50px rgba(200,255,0,0.7), 0 0 15px rgba(200,255,0,0.4);
  letter-spacing: 3px;
  pointer-events: none;
  transition: color 0.3s, text-shadow 0.3s;
  z-index: 10;
  display: none;
  white-space: nowrap;
}
/* Koef label "x" kichik ko'rinishi */
#coefLabel {
  position: absolute;
  top: calc(38% + 52px);
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  pointer-events: none;
  z-index: 10;
  display: none;
}

/* ===== CRASH OVERLAY ===== */
#crashOverlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(255,30,30,0.22);
  display: none;
  z-index: 5;
  pointer-events: none;
  animation: none;
}
@keyframes crashFlash {
  0%   { background: rgba(255,30,30,0.45); }
  30%  { background: rgba(255,60,0,0.30); }
  60%  { background: rgba(255,30,30,0.18); }
  100% { background: rgba(255,30,30,0.0); }
}
#crashOverlay.active {
  display: block;
  animation: crashFlash 0.7s ease-out forwards;
}

/* ===== RESULT BOX ===== */
#resultBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.85);
  background: linear-gradient(145deg, rgba(12,8,40,0.98), rgba(18,10,50,0.98));
  border: 2px solid #944ef5;
  border-radius: 22px;
  padding: 32px 60px;
  text-align: center;
  display: none;
  z-index: 20;
  box-shadow: 0 0 60px rgba(148,78,245,0.55), 0 0 120px rgba(148,78,245,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
  animation: none;
}
@keyframes popIn {
  0%   { transform: translate(-50%,-50%) scale(0.7); opacity:0; }
  70%  { transform: translate(-50%,-50%) scale(1.05); opacity:1; }
  100% { transform: translate(-50%,-50%) scale(1); opacity:1; }
}
#resultBox.show {
  display: block;
  animation: popIn 0.35s ease-out forwards;
}
#resultBox .crashed-label {
  font-size: 18px;
  font-weight: 700;
  color: #ff5555;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: 0.9;
}
#resultBox .final-coef {
  font-size: 70px;
  font-weight: 900;
  color: #ff9900;
  text-shadow: 0 0 30px rgba(255,150,0,0.9), 0 0 60px rgba(255,100,0,0.4);
  line-height: 1;
  margin: 4px 0 8px;
}
#resultBox .next-label {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  letter-spacing: 1px;
  margin-top: 6px;
}

/* ===== XARAKTER ===== */
#joe {
  position: absolute;
  width: 100px;
  height: 100px;
  pointer-events: none;
  z-index: 8;
  display: none;
  filter: drop-shadow(0 0 18px rgba(255,140,0,0.8)) drop-shadow(0 4px 10px rgba(0,0,0,0.6));
  transform-origin: 45% 55%;   /* samolyot markazi */
  will-change: transform, left, top;
}
#fire {
  position: absolute;
  width: 44px;
  height: 60px;
  pointer-events: none;
  z-index: 7;
  display: none;
  filter: drop-shadow(0 0 12px rgba(255,80,0,0.95)) drop-shadow(0 0 25px rgba(255,40,0,0.55));
  transform-origin: 50% 10%;   /* olov tepasidan aylansin */
  will-change: transform, left, top;
}

/* ===== WAITING LOADER ===== */
#waitingLoader {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  z-index: 15;
  pointer-events: none;
}
#waitingLoader img {
  width: 200px;
  height: 200px;
  filter: drop-shadow(0 0 35px rgba(148,78,245,1)) drop-shadow(0 0 70px rgba(100,50,220,0.6));
}
#waitingLoader .wait-label {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.55);
  text-transform: uppercase;
  animation: pulse 1.4s ease-in-out infinite;
  margin-top: 4px;
}
#waitingLoader .countdown {
  font-size: 48px;
  font-weight: 900;
  color: #c090ff;
  text-shadow: 0 0 28px rgba(148,78,245,1), 0 0 50px rgba(148,78,245,0.5);
  min-width: 60px;
  text-align: center;
  line-height: 1;
  font-family: 'Arial Black', sans-serif;
}
@keyframes pulse {
  0%,100% { opacity:1; }
  50%      { opacity:0.5; }
}
@keyframes countBounce {
  0%   { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* ===== HISTORY BAR ===== */
#historyBar {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  max-width: 340px;
  justify-content: flex-end;
  z-index: 10;
}
.hist-item {
  padding: 4px 11px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.5px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.35);
}
.hist-low  { background: linear-gradient(135deg, #2d4fd9, #3a5bd9); }
.hist-mid  { background: linear-gradient(135deg, #6d28d9, #7c3aed); }
.hist-high { background: linear-gradient(135deg, #c2410c, #ea580c); }
.hist-huge { background: linear-gradient(135deg, #b91c1c, #dc2626); box-shadow: 0 2px 12px rgba(220,38,38,0.5); }
</style>
</head>
<body>

<canvas id="starCanvas"></canvas>
<canvas id="gridCanvas"></canvas>

<div id="cloudLayer">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>
  <div class="cloud cloud-5"></div>
</div>

<canvas id="gameCanvas"></canvas>
<div id="crashOverlay"></div>

<img id="joe"  src="./images/boy.gif"  alt="">
<img id="fire" src="./images/fire.gif" alt="">

<div id="waitingLoader">
  <img src="./images/loads.svg" alt="loading">
  <div class="wait-label">ОЖИДАНИЕ</div>
  <div class="countdown" id="countdownNum">12</div>
</div>

<div id="coefDisplay">1.00x</div>
<div id="coefLabel">КОЭФФИЦИЕНТ</div>

<div id="resultBox">
  <div class="crashed-label">✈️ УЛЕТЕЛ!</div>
  <div class="final-coef" id="finalCoef">0.00x</div>
  <div class="next-label">Следующий раунд начинается...</div>
</div>

<div id="historyBar"></div>

<script>
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const coefDisplay   = document.getElementById('coefDisplay');
const coefLabel     = document.getElementById('coefLabel');
const crashOverlay  = document.getElementById('crashOverlay');
const resultBox     = document.getElementById('resultBox');
const finalCoefEl   = document.getElementById('finalCoef');
const joe           = document.getElementById('joe');
const fire          = document.getElementById('fire');
const historyBar    = document.getElementById('historyBar');
const waitingLoader = document.getElementById('waitingLoader');
const countdownNum  = document.getElementById('countdownNum');

const starCvs = document.getElementById('starCanvas');
const starCtx = starCvs.getContext('2d');
const gridCvs = document.getElementById('gridCanvas');
const gridCtx = gridCvs.getContext('2d');
const gameCvs = document.getElementById('gameCanvas');
const gameCtx = gameCvs.getContext('2d');

function resizeAll() {
  starCvs.width = gridCvs.width = gameCvs.width = W();
  starCvs.height = gridCvs.height = gameCvs.height = H();
  drawGrid();
  initStars();
}
window.addEventListener('resize', resizeAll);
resizeAll();

// ── YULDUZLAR ──────────────────────────────────────────────
let stars = [];
function initStars() {
  stars = [];
  const n = Math.floor(W() * H() / 5000);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * W(),
      y: Math.random() * H() * 0.88,
      r: Math.random() * 1.3 + 0.2,
      alpha: Math.random() * 0.5 + 0.2,
      speed: Math.random() * 0.7 + 0.2,
      phase: Math.random() * Math.PI * 2,
      diamond: Math.random() < 0.12
    });
  }
}

function drawStars(ts) {
  starCtx.clearRect(0, 0, W(), H());
  const t = ts / 1000;
  stars.forEach(s => {
    const a = s.alpha * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
    starCtx.save();
    starCtx.globalAlpha = a;
    starCtx.fillStyle = '#ffffff';
    if (s.diamond) {
      starCtx.beginPath();
      starCtx.moveTo(s.x, s.y - s.r * 2.2);
      starCtx.lineTo(s.x + s.r * 0.7, s.y);
      starCtx.lineTo(s.x, s.y + s.r * 2.2);
      starCtx.lineTo(s.x - s.r * 0.7, s.y);
      starCtx.closePath();
      starCtx.fill();
    } else {
      starCtx.beginPath();
      starCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      starCtx.fill();
    }
    starCtx.restore();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// ── GRID (faqat 2 o'q) ────────────────────────────────────
function drawGrid() {
  gridCtx.clearRect(0, 0, W(), H());
  gridCtx.strokeStyle = 'rgba(255,255,255,0.10)';
  gridCtx.lineWidth = 1.5;
  gridCtx.beginPath(); gridCtx.moveTo(60, 0); gridCtx.lineTo(60, H()); gridCtx.stroke();
  gridCtx.beginPath(); gridCtx.moveTo(0, H()-60); gridCtx.lineTo(W(), H()-60); gridCtx.stroke();
}

// ── GAME STATE ────────────────────────────────────────────
const ORIGIN_X = 80;
const ORIGIN_Y = () => H() - 80;

let state = 'waiting';
let coef = 1.00, targetCoef = 1.00, elapsed = 0;
let trailPts = [], animFrame = null, lastTs = null;
let history = [];

function generateCrashCoef() {
  const r = Math.random() * 100;
  if (r < 55) return +(Math.random() * (1.99 - 1.01) + 1.01).toFixed(2);
  if (r < 78) return +(Math.random() * (3.5  - 2.0)  + 2.0 ).toFixed(2);
  if (r < 90) return +(Math.random() * (7.0  - 3.5)  + 3.5 ).toFixed(2);
  if (r < 97) return +(Math.random() * (20.0 - 7.0)  + 7.0 ).toFixed(2);
  return              +(Math.random() * (100  - 20.0) + 20.0).toFixed(2);
}

function coefToPos(c) {
  const maxX = W() - 140;
  const maxY = H() - 150;
  // X: logarifmik o'sish — tezroq o'ngga
  const xRatio = Math.min(Math.log(Math.max(c, 1.001)) / Math.log(Math.max(targetCoef + 0.01, 1.01)), 1);
  const x = ORIGIN_X + xRatio * maxX;
  // Y: eksponensial ko'tarilish — boshlang'ichda tez ko'tariladi, keyin tekislanadi
  const t = (c - 1) / Math.max(targetCoef - 1, 0.01);
  const yRatio = Math.min(Math.pow(t, 0.55), 1);
  const y = ORIGIN_Y() - yRatio * maxY;
  return { x, y };
}

function coefColor(c) {
  if (c < 2)  return '#c8ff00';
  if (c < 5)  return '#ffe000';
  if (c < 10) return '#ff9900';
  return '#ff4444';
}

// ── TRAIL ─────────────────────────────────────────────────
function drawTrail() {
  gameCtx.clearRect(0, 0, W(), H());
  if (trailPts.length < 2) return;

  gameCtx.save();
  gameCtx.beginPath();
  gameCtx.moveTo(trailPts[0].x, ORIGIN_Y());
  trailPts.forEach(p => gameCtx.lineTo(p.x, p.y));
  gameCtx.lineTo(trailPts[trailPts.length-1].x, ORIGIN_Y());
  gameCtx.closePath();
  const g = gameCtx.createLinearGradient(0, ORIGIN_Y() - H()*0.6, 0, ORIGIN_Y());
  g.addColorStop(0, 'rgba(148,78,245,0.22)');
  g.addColorStop(1, 'rgba(148,78,245,0.01)');
  gameCtx.fillStyle = g;
  gameCtx.fill();
  gameCtx.restore();

  gameCtx.save();
  gameCtx.beginPath();
  gameCtx.moveTo(trailPts[0].x, trailPts[0].y);
  for (let i = 1; i < trailPts.length; i++) {
    const p = trailPts[i-1], q = trailPts[i];
    gameCtx.quadraticCurveTo(p.x, p.y, (p.x+q.x)/2, (p.y+q.y)/2);
  }
  gameCtx.lineTo(trailPts[trailPts.length-1].x, trailPts[trailPts.length-1].y);
  const lg = gameCtx.createLinearGradient(trailPts[0].x, 0, trailPts[trailPts.length-1].x, 0);
  lg.addColorStop(0,   '#5c24fc');
  lg.addColorStop(0.5, '#944ef5');
  lg.addColorStop(1, state === 'crashed' ? '#ff2222' : '#ff9900');
  gameCtx.strokeStyle = lg;
  gameCtx.lineWidth = 3;
  gameCtx.shadowColor = '#944ef5';
  gameCtx.shadowBlur = 12;
  gameCtx.stroke();
  gameCtx.restore();

  if (state !== 'crashed') {
    const tip = trailPts[trailPts.length - 1];
    // Tashqi glow halqa
    gameCtx.save();
    gameCtx.beginPath();
    gameCtx.arc(tip.x, tip.y, 9, 0, Math.PI * 2);
    gameCtx.fillStyle = 'rgba(255,153,0,0.18)';
    gameCtx.fill();
    gameCtx.restore();
    // Ichki dot
    gameCtx.save();
    gameCtx.beginPath();
    gameCtx.arc(tip.x, tip.y, 4.5, 0, Math.PI * 2);
    gameCtx.fillStyle = '#ffbb00';
    gameCtx.shadowColor = '#ff9900';
    gameCtx.shadowBlur = 18;
    gameCtx.fill();
    gameCtx.restore();
  }
  drawYLabels();
}

function drawYLabels() {
  const labels = [1, 2, 5, 10, 20, 50];
  gameCtx.save();
  gameCtx.font = 'bold 12px Arial';
  gameCtx.fillStyle = 'rgba(255,255,255,0.30)';
  labels.forEach(c => {
    if (c > targetCoef + 1) return;
    const pos = coefToPos(c);
    gameCtx.fillText(c + 'x', 10, pos.y + 4);
    gameCtx.save();
    gameCtx.strokeStyle = 'rgba(255,255,255,0.05)';
    gameCtx.lineWidth = 1;
    gameCtx.setLineDash([4, 6]);
    gameCtx.beginPath();
    gameCtx.moveTo(60, pos.y);
    gameCtx.lineTo(W(), pos.y);
    gameCtx.stroke();
    gameCtx.restore();
  });
  gameCtx.restore();
}

// ── JOE + FIRE ────────────────────────────────────────────
function placeJoe(x, y) {
  // Trail yo'nalishi bo'yicha burchak hisoblash
  let angle = -30; // boshlang'ich burchak (yuqoriga-o'ngga)
  if (trailPts.length >= 3) {
    // So'nggi 3 nuqtadan silliq burchak olish
    const a = trailPts[trailPts.length - 3];
    const b = trailPts[trailPts.length - 1];
    const rawAngle = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
    // Burchakni -60 dan +5 gacha cheklash (pastga tushmasin)
    angle = Math.max(-60, Math.min(5, rawAngle));
  }

  // Joe markazini trail tip ga moslashtirish
  // boy.gif da samolyot markazda — uni tip nuqtasiga aniq qo'yamiz
  const joeW = 95, joeH = 95;
  joe.style.left      = (x - joeW * 0.45) + 'px';
  joe.style.top       = (y - joeH * 0.55) + 'px';
  joe.style.transform = `rotate(${angle}deg)`;

  // Fire — samolyot orqasida (chap-past qismi)
  const fireOffX = Math.cos((angle + 180) * Math.PI / 180) * 28;
  const fireOffY = Math.sin((angle + 180) * Math.PI / 180) * 28;
  fire.style.left      = (x + fireOffX - 22) + 'px';
  fire.style.top       = (y + fireOffY - 10) + 'px';
  fire.style.transform = `rotate(${angle + 180}deg)`;
}

// ── HISTORY ───────────────────────────────────────────────
function addHistory(c) {
  history.unshift(c);
  if (history.length > 8) history.pop();
  historyBar.innerHTML = '';
  history.forEach(v => {
    const d = document.createElement('div');
    d.className = 'hist-item ' +
      (v < 2 ? 'hist-low' : v < 5 ? 'hist-mid' : v < 20 ? 'hist-high' : 'hist-huge');
    d.textContent = v + 'x';
    historyBar.appendChild(d);
  });
}

// ── GAME LOOP ─────────────────────────────────────────────
let cdInterval = null;

function startRound() {
  state = 'waiting';
  coef = 1.00; elapsed = 0; trailPts = []; lastTs = null;
  targetCoef = generateCrashCoef();

  // Reset UI
  coefDisplay.style.display  = 'none';
  coefDisplay.style.color    = '#c8ff00';
  coefLabel.style.display    = 'none';
  crashOverlay.className     = '';
  crashOverlay.style.display = 'none';
  resultBox.className        = '';
  resultBox.style.display    = 'none';
  joe.style.opacity    = '1';
  joe.style.transition = '';
  joe.style.transform  = '';
  joe.style.display    = 'none';
  fire.style.opacity   = '1';
  fire.style.transition = '';
  fire.style.transform  = '';
  fire.style.display    = 'none';
  gameCtx.clearRect(0, 0, W(), H());

  // Waiting countdown
  waitingLoader.style.display = 'flex';
  let secs = 12;
  countdownNum.textContent = secs;
  countdownNum.style.animation = '';

  if (cdInterval) clearInterval(cdInterval);
  cdInterval = setInterval(() => {
    secs--;
    if (secs > 0) {
      countdownNum.textContent = secs;
    } else {
      countdownNum.textContent = '🚀';
      clearInterval(cdInterval);
    }
    // Bounce animation on each tick
    countdownNum.style.animation = 'none';
    countdownNum.offsetHeight; // reflow trigger
    countdownNum.style.animation = 'countBounce 0.3s ease-out';
  }, 1000);

  setTimeout(() => {
    clearInterval(cdInterval);
    waitingLoader.style.display = 'none';

    joe.style.display    = 'block';
    fire.style.display   = 'block';
    // Boshlang'ich nuqtani trail ga qo'shamiz — burchak hisoblash uchun
    trailPts.push({ x: ORIGIN_X, y: ORIGIN_Y() });
    trailPts.push({ x: ORIGIN_X + 2, y: ORIGIN_Y() - 3 });
    placeJoe(ORIGIN_X, ORIGIN_Y());

    coefDisplay.style.display = 'block';
    coefDisplay.textContent   = '1.00x';
    coefDisplay.style.color   = '#c8ff00';
    updateCoefShadow('#c8ff00');
    coefLabel.style.display   = 'block';

    state  = 'flying';
    lastTs = null;
    requestAnimationFrame(loop);
  }, 12000);
}

function updateCoefShadow(color) {
  const shadows = {
    '#c8ff00': '0 0 50px rgba(200,255,0,0.7), 0 0 15px rgba(200,255,0,0.4)',
    '#ffe000': '0 0 50px rgba(255,224,0,0.7), 0 0 15px rgba(255,200,0,0.4)',
    '#ff9900': '0 0 50px rgba(255,153,0,0.7), 0 0 15px rgba(255,120,0,0.4)',
    '#ff4444': '0 0 50px rgba(255,60,60,0.8),  0 0 15px rgba(255,30,30,0.5)',
  };
  coefDisplay.style.textShadow = shadows[color] || shadows['#c8ff00'];
}

function loop(ts) {
  if (state !== 'flying') return;
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;
  elapsed += dt;

  const speed = 0.45 + elapsed * 0.20;
  coef = Math.min(coef + speed * dt, targetCoef);

  const pos = coefToPos(coef);
  trailPts.push({ x: pos.x, y: pos.y });
  if (trailPts.length > 400) trailPts.shift();

  drawTrail();
  // Samolyotni trail so'nggi nuqtasiga qo'yamiz
  placeJoe(pos.x, pos.y);

  const color = coefColor(coef);
  coefDisplay.textContent = coef.toFixed(2) + 'x';
  coefDisplay.style.color = color;
  updateCoefShadow(color);

  if (coef >= targetCoef) { crash(); return; }
  animFrame = requestAnimationFrame(loop);
}

function crash() {
  state = 'crashed';
  cancelAnimationFrame(animFrame);

  // Flash overlay with CSS animation
  crashOverlay.style.display = 'block';
  crashOverlay.className = '';
  crashOverlay.offsetHeight; // reflow
  crashOverlay.className = 'active';
  setTimeout(() => {
    crashOverlay.className = '';
    crashOverlay.style.display = 'none';
  }, 750);

  // Joe flies away
  joe.style.transition  = 'transform 0.5s ease-in, opacity 0.45s ease-in';
  fire.style.transition = 'transform 0.5s ease-in, opacity 0.45s ease-in';
  joe.style.opacity     = '0';
  fire.style.opacity    = '0';
  joe.style.transform   += ' scale(0.4) translateY(-80px) translateX(30px)';
  fire.style.transform  += ' scale(0.4) translateY(-80px) translateX(30px)';

  // Crash coef color
  coefDisplay.style.color = '#ff4444';
  updateCoefShadow('#ff4444');

  if (trailPts.length > 1) drawTrail();

  setTimeout(() => {
    finalCoefEl.textContent = targetCoef.toFixed(2) + 'x';
    // Color final coef based on value
    finalCoefEl.style.color =
      targetCoef >= 10 ? '#ff4444' :
      targetCoef >= 5  ? '#ff9900' :
      targetCoef >= 2  ? '#ffe000' : '#c8ff00';

    resultBox.style.display = 'block';
    resultBox.className = '';
    resultBox.offsetHeight;
    resultBox.className = 'show';
    addHistory(targetCoef);

    setTimeout(() => {
      resultBox.className = '';
      resultBox.style.display = 'none';
      startRound();
    }, 3000);
  }, 400);
}

startRound();
</script>
